services:
  ferricula:
    build:
      context: ../ferricula
    ports:
      - "8765:8765"
    volumes:
      - ferricula-data:/data
    environment:
      - PORT=8765
    restart: unless-stopped

  train:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - data-cache:/root/.cache/autoresearch
      - ./results.tsv:/app/results.tsv
      - ./run.log:/app/run.log
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: uv run train.py

  agent:
    build: .
    runtime: nvidia
    depends_on:
      - ferricula
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FERRICULA_URL=http://ferricula:8765
    volumes:
      - data-cache:/root/.cache/autoresearch
      - ./results.tsv:/app/results.tsv
      - ./run.log:/app/run.log
      - ./.git:/app/.git
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      python agent.py
        --provider ${AGENT_PROVIDER:-anthropic}
        --model ${AGENT_MODEL:-claude-sonnet-4-20250514}
        --memory ${FERRICULA_URL:-http://ferricula:8765}

  prepare:
    build: .
    volumes:
      - data-cache:/root/.cache/autoresearch
    command: uv run prepare.py --num-shards 10
    profiles: [setup]

volumes:
  data-cache:
  ferricula-data:
